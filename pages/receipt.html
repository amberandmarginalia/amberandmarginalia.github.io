<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interactive Receiptify</title>
  <script src="/js/receipt.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"></script>
  <link rel="stylesheet" href="/styles/receipt.css">
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <a href="/"><h3 style="text-align: left; padding: 20px;">Return Home</h3></a>
  <h1>Amber's Records Music Receipt</h1>

  <form id="songForm">
    <input type="text" id="userName" placeholder="Your name">
    <input type="text" id="subtitle" placeholder="Subtitle (optional)">
    <input type="text" id="songTitle" placeholder="Song title and author">
    <input type="text" id="songLength" placeholder="Length (e.g. 3:45)">
    <button type="button" onclick="addSong()">Add Song</button>
  </form>

  <div id="receipt">
    <h2>AMBER'S RECORDS</h2>
    <p class="subtitle" id="receiptSubtitle"></p>
    <div id="receiptHeader"></div>

    <div class="dotted-line"></div>
    <div class="columns">
      <span>QTY</span>
      <span>ITEM</span>
      <span>ATM</span>
    </div>
    <div class="dotted-line"></div>

    <div id="songList"></div>

    <div class="dotted-line"></div>
    <div id="summary"></div>

    <div class="dotted-line"></div>
    <div class="footer" id="footer"></div>

    <img id="barcode" class="barcode" alt="Barcode">
    <p class="link" id="weblink"></p>
  </div>

  <button id="download" onclick="downloadReceipt()">Download as Image</button>

  <script>
    
  </script>
</body>
</html>
